    Value: !GetAtt RuterEcsTaskExecutionRole.Arn
  BedrockTaskRoleArn:
    Value: !GetAtt RuterBedrockTaskRole.Arn
  LoadBalancerArn:
    Value: !Ref RuterAlb
  ApiRepositoryUri:
    Value: !GetAtt RuterChatbotRepository.RepositoryUri
  ChainlitRepositoryUri:
    Value: !GetAtt RuterChainlitRepository.RepositoryUri
  ApiTargetGroupArn:
    Value: !Ref ApiTargetGroup
  ApiGreenTargetGroupArn:
    Value: !Ref ApiGreenTargetGroup
  ChainlitTargetGroupArn:
    Value: !Ref ChainlitTargetGroup
  ChainlitGreenTargetGroupArn:
