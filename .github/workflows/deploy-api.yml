name: Deploy API to ECS

on:
  push:
    branches:
      - dev
      - main
    paths:
      - Dockerfile.prod
      - pyproject.toml
      - uv.lock
      - src/**
      - .github/workflows/deploy-api.yml
      - .github/workflows/deploy-ecs-reusable.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy-ecs-reusable.yml
    with:
      aws_region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::796576079636:role/GitHubActionsDeployRole' }}
      ecr_repository: ruter-chatbot
      ecs_cluster: ruter-chatbot
      ecs_service: ruter-chatbot-service
      ecs_task_family: ruter-chatbot
      ecs_container_name: ruter-prod
      dockerfile: Dockerfile.prod
